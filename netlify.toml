# Netlify configuration for Accelerator X website
# Configures build, functions, and security headers

[build]
  publish = "."
  command = "echo 'Static site ready'"

# Functions directory for serverless functions
[functions]
  directory = "netlify/functions"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively (immutable by filename)
[[headers]]
  for = "/**/*.@(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep HTML short-lived to pick up updates
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
