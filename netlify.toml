# Netlify configuration for Accelerator X website
# Configures build, functions, and security headers

[build]
  publish = "."
  # Build artefacts (index.html, insights/, sitemap.xml) are pre-built locally and committed.
  # Netlify serves the repo root as-is. Run `npm run build` locally before every push.
  command = "echo 'Static site ready — pre-built artefacts committed to repo'"

# Functions directory for serverless functions
[functions]
  directory = "netlify/functions"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively (immutable by filename)
[[headers]]
  for = "/**/*.@(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep HTML short-lived to pick up updates
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

# ── ScoreKit quiz deployments ─────────────────────────────────────────────────
# Each quiz is a separate Vercel project proxied under /quiz/<slug>.
# status = 200 means Netlify rewrites the request (browser URL stays the same).
# force = true ensures this rule fires even if a matching file exists locally.
#
# To add a new quiz:
# 1. Deploy a new Vercel project with NEXT_PUBLIC_BASE_PATH=/quiz/<slug>
# 2. Copy this block, update `from` and `to` with the new slug + Vercel URL
# ─────────────────────────────────────────────────────────────────────────────

# AI Readiness Assessment — Accelerator-X
# Replace YOUR_VERCEL_DEPLOYMENT_URL with the actual .vercel.app URL after deploying
[[redirects]]
  from = "/quiz/aireadiness"
  to = "https://YOUR_VERCEL_DEPLOYMENT_URL/quiz/aireadiness"
  status = 200
  force = true

[[redirects]]
  from = "/quiz/aireadiness/*"
  to = "https://YOUR_VERCEL_DEPLOYMENT_URL/quiz/aireadiness/:splat"
  status = 200
  force = true
