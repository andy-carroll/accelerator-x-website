<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're subscribed | Accelerator X</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
  </head>

  <body class="bg-surface text-navy min-h-screen flex flex-col">
    <header class="sticky top-0 z-50 border-b border-surface bg-background-95 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="/">
          <img
            src="/assets/icons/AX-wordmark-and-logo.png"
            alt="Accelerator X"
            class="h-7 w-auto"
            width="1125"
            height="195"
            loading="eager"
            decoding="async"
          />
        </a>
        <a href="/#apply" class="btn btn-primary btn-sm">Apply to work with us</a>
      </div>
    </header>

    <main class="flex-grow px-4 py-16 lg:py-24">
      <div class="mx-auto max-w-xl">
        <div class="rounded-xl bg-background p-8 shadow-sm">
          <div class="mb-4 flex items-center justify-center">
            <span class="material-symbols-outlined text-4xl text-primary">check_circle</span>
          </div>
          <h1 class="font-display text-3xl font-bold text-navy text-center">You're on the list.</h1>
          <p class="mt-4 text-body text-center">
            Thanks for subscribing. We’ll send the weekly dispatch when it’s ready.
          </p>
          <p class="mt-2 text-sm text-muted text-center">
            If you don’t see anything, check spam or promotions.
          </p>

          <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
            <a href="/" class="btn btn-primary">Back to the site</a>
            <a href="/insights/" class="btn btn-secondary">Read Insights</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="border-t border-surface bg-background py-12">
      <div class="mx-auto max-w-6xl px-4">
        <div class="flex flex-col items-center justify-between gap-6 lg:flex-row">
          <div class="font-display text-lg font-bold text-navy">Accelerator X</div>
          <div class="flex items-center gap-6">
            <a
              href="https://linkedin.com"
              target="_blank"
              rel="noopener"
              class="text-muted transition hover:text-navy"
              aria-label="LinkedIn"
            >
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
            </a>
            <a
              href="mailto:hello@accelerator-x.ai"
              class="text-muted transition hover:text-navy"
              aria-label="Email"
            >
              <span class="material-symbols-outlined">mail</span>
            </a>
          </div>
          <p class="text-sm text-muted">© 2026 Accelerator X. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
