<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terms of Use | Accelerator X</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-slate-50 text-navy" style="font-family: var(--font-body);">
  <main class="legal-shell">
    <div class="legal-card">
      <header class="mb-6">
        <p class="legal-meta text-sm">Accelerator X</p>
        <h1 class="font-display text-3xl font-bold text-navy">Terms of Use</h1>
        <p class="legal-meta text-sm">Last updated: February 6, 2026</p>
      </header>

      <section id="terms-content" class="leading-relaxed text-muted">
        <p class="text-muted">Loading…</p>
      </section>
    </div>
  </main>

  <script>
    async function loadMarkdown(url, targetId) {
      const res = await fetch(url);
      const md = await res.text();
      document.getElementById(targetId).innerHTML = markdownToHtml(md);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function markdownToHtml(md) {
      const lines = md.split(/\r?\n/);
      let html = '';
      let inList = false;

      for (const raw of lines) {
        const line = raw.trimEnd();
        if (!line) {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }

        if (/^[-*]\s+/.test(line)) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${escapeHtml(line.replace(/^[-*]\s+/, ''))}</li>`;
          continue;
        }

        if (inList) { html += '</ul>'; inList = false; }

        if (/^###\s+/.test(line)) {
          html += `<h3>${escapeHtml(line.replace(/^###\s+/, ''))}</h3>`;
        } else if (/^##\s+/.test(line)) {
          html += `<h2>${escapeHtml(line.replace(/^##\s+/, ''))}</h2>`;
        } else if (/^#\s+/.test(line)) {
          html += `<h1>${escapeHtml(line.replace(/^#\s+/, ''))}</h1>`;
        } else {
          html += `<p>${escapeHtml(line)}</p>`;
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

    loadMarkdown('/legal/terms.md', 'terms-content');
  </script>
</body>
</html>
